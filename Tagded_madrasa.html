<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرسة القلوب — خطة التجديد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:       #198D87;
    --teal-dark:  #126660;
    --teal-light: #e0f4f3;
    --teal-mid:   #9dd9d6;
    --amber:      #d4863a;
    --amber-light:#fdf0e3;
    --red:        #c0392b;
    --red-light:  #fdecea;
    --green:      #2d7a56;
    --green-light:#e6f4ed;
    --gray:       #6b7280;
    --gray-light: #f3f4f6;
    --gray-border:#e5e7eb;
    --text:       #1a1a2e;
    --text-muted: #6b7280;
    --bg:         #f8faf9;
    --white:      #ffffff;
    --shadow:     0 2px 16px rgba(18,102,96,.08);
    --shadow-card:0 4px 24px rgba(18,102,96,.10);
    --radius:     16px;
    --radius-sm:  10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ─── Header ─── */
  .header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 60%, #1db8b0 100%);
    padding: 2.5rem 2rem 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -80px; right: 10%;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,.04);
  }
  .header-inner {
    position: relative;
    max-width: 860px;
    margin: 0 auto;
  }
  .header-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: rgba(255,255,255,.65);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .header h1 span {
    color: rgba(255,255,255,.55);
    font-size: .6em;
    font-weight: 400;
    display: block;
    font-family: 'Tajawal', sans-serif;
    letter-spacing: .5px;
  }
  .header-today {
    font-size: 13px;
    color: rgba(255,255,255,.7);
    margin-top: 10px;
  }

  /* ─── Notification bar ─── */
  .notif {
    display: none;
    max-width: 860px;
    margin: -20px auto 0;
    position: relative;
    z-index: 10;
    padding: 0 1.5rem;
  }
  .notif.show { display: block; }
  .notif-inner {
    background: var(--amber-light);
    border: 1.5px solid var(--amber);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .notif-icon { font-size: 20px; flex-shrink: 0; }
  .notif-text { font-size: 13px; color: #7a4a10; line-height: 1.6; }
  .notif-text strong { font-weight: 700; display: block; margin-bottom: 3px; }

  /* ─── Stats ─── */
  .stats-wrap {
    max-width: 860px;
    margin: 2rem auto 0;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 18px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-border);
  }
  .stat-card .num {
    font-size: 26px;
    font-weight: 700;
    color: var(--teal-dark);
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ─── Main content ─── */
  .main {
    max-width: 860px;
    margin: 2rem auto 4rem;
    padding: 0 1.5rem;
  }

  /* ─── Month card ─── */
  .month-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-border);
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .month-card:hover { box-shadow: var(--shadow-card); }

  .month-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    flex-wrap: wrap;
  }
  .month-head:hover { background: #fafcfc; }

  .month-num {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--teal-light);
    color: var(--teal-dark);
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .month-info { flex: 1; min-width: 120px; }
  .month-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .month-dates { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-green  { background: var(--green-light);  color: var(--green); }
  .badge-amber  { background: var(--amber-light);  color: var(--amber); }
  .badge-red    { background: var(--red-light);    color: var(--red); }
  .badge-gray   { background: var(--gray-light);   color: var(--gray); }
  .badge-teal   { background: var(--teal-light);   color: var(--teal-dark); }

  .chevron {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform .25s;
    margin-right: auto;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* ─── Card body ─── */
  .month-body {
    display: none;
    border-top: 1px solid var(--gray-border);
    padding: 20px;
    animation: fadeIn .18s ease;
  }
  .month-body.open { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .section-lbl {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .section-lbl:first-child { margin-top: 0; }

  /* prices */
  .prices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .price-box {
    background: var(--gray-light);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .price-box .ptype { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
  .price-box .pegp  { font-size: 20px; font-weight: 700; color: var(--teal-dark); }
  .price-box .pusd  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .price-box .pextra{ font-size: 11px; color: var(--amber); margin-top: 4px; font-weight: 600; }

  /* links */
  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-border);
    flex-wrap: wrap;
  }
  .link-row:last-child { border-bottom: none; }
  .link-label { font-size: 13px; color: var(--text-muted); }
  .link-actions { display: flex; gap: 8px; align-items: center; }
  .btn-copy, .btn-open {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    border: 1.5px solid;
    text-decoration: none;
    font-family: 'Tajawal', sans-serif;
    transition: all .15s;
    display: inline-block;
  }
  .btn-open  {
    background: var(--teal-dark);
    color: #fff;
    border-color: var(--teal-dark);
  }
  .btn-open:hover { background: var(--teal); }
  .btn-copy  {
    background: transparent;
    color: var(--teal-dark);
    border-color: var(--teal-mid);
  }
  .btn-copy:hover { background: var(--teal-light); }
  .btn-copy.copied { color: var(--green); border-color: var(--green); }

  /* notes + status */
  .notes-area {
    width: 100%;
    border: 1.5px solid var(--gray-border);
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    resize: vertical;
    background: var(--white);
    color: var(--text);
    min-height: 64px;
    transition: border-color .15s;
  }
  .notes-area:focus { outline: none; border-color: var(--teal); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .status-lbl { font-size: 13px; color: var(--text-muted); }
  select.status-sel {
    font-size: 13px;
    padding: 6px 12px;
    border: 1.5px solid var(--gray-border);
    border-radius: 20px;
    background: var(--white);
    color: var(--text);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
  }
  select.status-sel:focus { outline: none; border-color: var(--teal); }

  .save-btn {
    font-size: 12px;
    padding: 6px 20px;
    border-radius: 20px;
    border: 1.5px solid var(--teal-dark);
    background: transparent;
    color: var(--teal-dark);
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    margin-right: auto;
    transition: all .15s;
  }
  .save-btn:hover { background: var(--teal-dark); color: #fff; }
  .save-btn.saved { background: var(--green); border-color: var(--green); color: #fff; }

  /* ─── Progress timeline ─── */
  .timeline {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 2rem;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tl-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 80px;
  }
  .tl-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--gray-border);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    position: relative;
    z-index: 1;
    transition: all .2s;
  }
  .tl-dot.active { background: var(--teal-dark); border-color: var(--teal-dark); color: #fff; box-shadow: 0 0 0 4px var(--teal-light); }
  .tl-dot.done   { background: var(--green);     border-color: var(--green);     color: #fff; }
  .tl-dot.open-now { background: var(--amber); border-color: var(--amber); color: #fff; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(212,134,58,.4)} 50%{box-shadow:0 0 0 8px rgba(212,134,58,0)} }
  .tl-label { font-size: 10px; color: var(--text-muted); margin-top: 5px; text-align: center; }
  .tl-line { flex: 1; height: 2px; background: var(--gray-border); min-width: 20px; margin-top: -14px; }
  .tl-line.done { background: var(--green); }
  .tl-line.active { background: linear-gradient(90deg, var(--green), var(--teal-mid)); }

  /* ─── Settings modal ─── */
  .fab {
    position: fixed;
    bottom: 28px;
    left: 28px;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--teal-dark);
    color: #fff;
    border: none;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(18,102,96,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    z-index: 100;
  }
  .fab:hover { background: var(--teal); transform: scale(1.05); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    width: min(90vw, 440px);
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    direction: rtl;
  }
  .modal h2 { font-size: 18px; font-weight: 700; color: var(--teal-dark); margin-bottom: 4px; }
  .modal p  { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
  .modal-close {
    float: left;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text-muted);
    line-height: 1;
    margin-top: -4px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; }
  .field-group input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--gray-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    direction: ltr;
    color: var(--text);
  }
  .field-group input:focus { outline: none; border-color: var(--teal); }
  .modal-save-btn {
    width: 100%;
    padding: 11px;
    background: var(--teal-dark);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background .15s;
  }
  .modal-save-btn:hover { background: var(--teal); }

  /* ─── Responsive ─── */
  @media (max-width: 540px) {
    .prices-grid { grid-template-columns: 1fr; }
    .month-head  { padding: 14px 16px; gap: 10px; }
    .month-body  { padding: 16px; }
    .header      { padding: 2rem 1.25rem 3rem; }
  }

  /* ─── Utility ─── */
  .mt-2  { margin-top: 8px; }
  .no-link { color: var(--text-muted); font-size: 12px; font-style: italic; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-label">لوحة إدارة التجديد</div>
    <h1>مدرسة القلوب <span>خطة الاشتراك والتجديد</span></h1>
    <div class="header-today" id="today-label">⏱ جارٍ التحميل...</div>
  </div>
</div>

<!-- NOTIFICATION BAR -->
<div class="notif" id="notif-bar">
  <div class="notif-inner">
    <span class="notif-icon">🔔</span>
    <div class="notif-text">
      <strong>تنبيه: موعد التجديد قريب!</strong>
      <span id="notif-text"></span>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="stats-wrap">
  <div class="stat-card">
    <div class="num" id="stat-open">—</div>
    <div class="lbl">الحجز مفتوح الآن</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-next">—</div>
    <div class="lbl">الحجز القادم يفتح</div>
  </div>
  <div class="stat-card">
    <div class="num">6</div>
    <div class="lbl">إجمالي الأشهر</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-done">0</div>
    <div class="lbl">تم الإعلان عنها</div>
  </div>
</div>

<!-- TIMELINE -->
<div class="main">
  <div class="timeline" id="timeline"></div>

  <!-- MONTH CARDS -->
  <div id="cards-container"></div>
</div>

<!-- FAB: edit settings -->
<button class="fab" id="fab-btn" title="إعدادات">⚙</button>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <h2>تعديل بيانات الشهر</h2>
    <p id="modal-subtitle">تعديل تفاصيل الدفع والروابط</p>
    <div id="modal-fields"></div>
    <button class="modal-save-btn" id="modal-save-btn">حفظ التغييرات</button>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const MONTHS = [
  {
    id: 0,
    label: "الشهر الأول",
    bookStart: "2025-04-01",
    bookEnd:   "2025-04-25",
    egpFull:   550, egpMonth: 130,
    usdFull:   55,  usdMonth: 10,
    extraEGP:  null, extraUSD: null,
    linkFull:  "",
    linkMonth: "",
    status:    "active",
    note:      ""
  },
  {
    id: 1,
    label: "الشهر الثاني",
    bookStart: "2025-05-20",
    bookEnd:   "2025-06-01",
    egpFull:   500, egpMonth: 130,
    usdFull:   50,  usdMonth: 10,
    extraEGP:  50,  extraUSD: 5,
    linkFull:  "https://buy.stripe.com/7sY28ke2mc0y0aIbzi2Ji0Z",
    linkMonth: "https://buy.stripe.com/7sY3coaQa0hQ7Da32M2Ji14",
    status:    "upcoming",
    note:      ""
  },
  {
    id: 2,
    label: "الشهر الثالث",
    bookStart: "2025-06-26",
    bookEnd:   "2025-07-06",
    egpFull:   450, egpMonth: 130,
    usdFull:   45,  usdMonth: 10,
    extraEGP:  50,  extraUSD: 5,
    linkFull:  "https://buy.stripe.com/3cIaEQ2jE6Ge2iQ7j22Ji10",
    linkMonth: "https://buy.stripe.com/4gMeV60bw8Om4qYdHq2Ji15",
    status:    "upcoming",
    note:      ""
  },
  {
    id: 3,
    label: "الشهر الرابع",
    bookStart: "2025-07-24",
    bookEnd:   "2025-08-03",
    egpFull:   450, egpMonth: 130,
    usdFull:   45,  usdMonth: 10,
    extraEGP:  50,  extraUSD: 5,
    linkFull:  "https://buy.stripe.com/5kQ4gsf6q3u29Li8n62Ji11",
    linkMonth: "https://buy.stripe.com/4gM00c3nI8Om2iQdHq2Ji16",
    status:    "upcoming",
    note:      ""
  },
  {
    id: 4,
    label: "الشهر الخامس",
    bookStart: "2025-08-21",
    bookEnd:   "2025-08-31",
    egpFull:   400, egpMonth: 130,
    usdFull:   35,  usdMonth: 10,
    extraEGP:  50,  extraUSD: 5,
    linkFull:  "https://buy.stripe.com/7sYcMY0bw4y6e1y7j22Ji12",
    linkMonth: "https://buy.stripe.com/dRm14g0bw6Ge7Da8n62Ji17",
    status:    "upcoming",
    note:      ""
  },
  {
    id: 5,
    label: "الشهر السادس",
    bookStart: "2025-09-25",
    bookEnd:   "2025-10-05",
    egpFull:   350, egpMonth: 130,
    usdFull:   30,  usdMonth: 10,
    extraEGP:  50,  extraUSD: 5,
    linkFull:  "https://buy.stripe.com/14A4gs2jE4y61eMfPy2Ji13",
    linkMonth: "",
    status:    "upcoming",
    note:      ""
  }
];

// ─── Storage ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'mqulub_v2';

function loadSaved() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const saved = JSON.parse(s);
      saved.forEach((sv, i) => {
        if (!MONTHS[i]) return;
        ['note','status','egpFull','egpMonth','usdFull','usdMonth',
         'extraEGP','extraUSD','linkFull','linkMonth',
         'bookStart','bookEnd','label'].forEach(k => {
          if (sv[k] !== undefined) MONTHS[i][k] = sv[k];
        });
      });
    }
  } catch(e) {}
}

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(MONTHS)); } catch(e) {}
}

// ─── Date helpers ─────────────────────────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function parseD(s) {
  if (!s) return null;
  const d = new Date(s); d.setHours(0,0,0,0); return d;
}
function daysDiff(s) {
  const d = parseD(s); if (!d) return null;
  return Math.round((d - TODAY) / 86400000);
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function todayStr() {
  const d = TODAY;
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  return `${days[d.getDay()]}، ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ─── Alert logic ──────────────────────────────────────────────────────────────
function getAlert(m) {
  if (!m.bookStart) return { cls:'badge-teal', txt:'جارٍ الآن', tl:'active' };
  const ds = daysDiff(m.bookStart);
  const de = m.bookEnd ? daysDiff(m.bookEnd) : null;
  if (ds <= 0 && (de === null || de >= 0)) return { cls:'badge-amber', txt:'الحجز مفتوح الآن!', tl:'open-now' };
  if (de !== null && de < 0)               return { cls:'badge-gray',  txt:'انتهى الحجز',      tl:'done' };
  if (ds <= 5)                             return { cls:'badge-red',   txt:`يفتح خلال ${ds} أيام`, tl:'soon' };
  if (ds <= 14)                            return { cls:'badge-amber', txt:`يفتح ${fmtDate(m.bookStart)}`, tl:'upcoming' };
  return { cls:'badge-green', txt:`يفتح ${fmtDate(m.bookStart)}`, tl:'upcoming' };
}

function getStatusBadge(status) {
  const map = {
    upcoming: { cls:'badge-gray',  txt:'قادم' },
    active:   { cls:'badge-teal',  txt:'جارٍ الآن' },
    done:     { cls:'badge-green', txt:'تم الإعلان' },
    closed:   { cls:'badge-gray',  txt:'انتهى' },
  };
  return map[status] || map.upcoming;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('today-label').textContent = `📅 ${todayStr()}`;

  // notifications
  const warnings = MONTHS.filter(m => {
    if (!m.bookStart) return false;
    const ds = daysDiff(m.bookStart);
    return ds >= 0 && ds <= 5;
  });
  const nb = document.getElementById('notif-bar');
  if (warnings.length) {
    nb.classList.add('show');
    document.getElementById('notif-text').textContent =
      warnings.map(m => `${m.label}: يفتح الحجز في ${fmtDate(m.bookStart)} (خلال ${daysDiff(m.bookStart)} أيام)`).join(' — ');
  } else {
    nb.classList.remove('show');
  }

  // stats
  const openNow = MONTHS.filter(m => {
    if (!m.bookStart) return false;
    const ds = daysDiff(m.bookStart), de = m.bookEnd ? daysDiff(m.bookEnd) : null;
    return ds <= 0 && (de === null || de >= 0);
  });
  document.getElementById('stat-open').textContent = openNow.length ? openNow[0].label : 'لا يوجد';
  const nextM = MONTHS.find(m => m.bookStart && daysDiff(m.bookStart) > 0);
  document.getElementById('stat-next').textContent = nextM ? fmtDate(nextM.bookStart) : '—';
  document.getElementById('stat-done').textContent = MONTHS.filter(m => m.status === 'done').length;

  // timeline
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const al = getAlert(m);
    const dotCls = al.tl === 'active' || al.tl === 'open-now' ? al.tl : (al.tl === 'done' ? 'done' : '');
    const item = document.createElement('div'); item.className = 'tl-item';
    item.innerHTML = `<div class="tl-dot ${dotCls}">${i+1}</div><div class="tl-label">${m.label.replace('الشهر ','')}</div>`;
    tl.appendChild(item);
    if (i < MONTHS.length - 1) {
      const line = document.createElement('div');
      line.className = 'tl-line' + (al.tl === 'done' ? ' done' : al.tl === 'active' || al.tl === 'open-now' ? ' active' : '');
      tl.appendChild(line);
    }
  });

  // cards
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  MONTHS.forEach((m) => {
    const al    = getAlert(m);
    const stBdg = getStatusBadge(m.status);
    const datesTxt = m.bookStart
      ? `فتح الحجز: ${fmtDate(m.bookStart)} ← ${fmtDate(m.bookEnd)}`
      : 'بدون فترة حجز محددة';

    const card = document.createElement('div');
    card.className = 'month-card';

    // HEAD
    const head = document.createElement('div');
    head.className = 'month-head';
    head.innerHTML = `
      <div class="month-num">${m.id + 1}</div>
      <div class="month-info">
        <div class="month-name">${m.label}</div>
        <div class="month-dates">${datesTxt}</div>
      </div>
      <span class="badge ${al.cls}">${al.txt}</span>
      <span class="badge ${stBdg.cls}">${stBdg.txt}</span>
      <span class="chevron" id="chev-${m.id}">▼</span>
    `;

    // BODY
    const body = document.createElement('div');
    body.className = 'month-body';
    body.id = `body-${m.id}`;

    const extraNote = (m.extraEGP || m.extraUSD)
      ? `+${m.extraEGP||0} ج.م / +${m.extraUSD||0}$ عن كل شهر قديم`
      : 'لا توجد رسوم إضافية';

    const fullLink  = m.linkFull  ? `<a href="${m.linkFull}"  target="_blank" class="btn-open">فتح</a><button class="btn-copy" onclick="copyLink('${m.linkFull}',this)">نسخ</button>` : `<span class="no-link">لا يوجد رابط</span>`;
    const monthLink = m.linkMonth ? `<a href="${m.linkMonth}" target="_blank" class="btn-open">فتح</a><button class="btn-copy" onclick="copyLink('${m.linkMonth}',this)">نسخ</button>` : `<span class="no-link">لا يوجد رابط</span>`;

    body.innerHTML = `
      <div class="section-lbl">الأسعار</div>
      <div class="prices-grid">
        <div class="price-box">
          <div class="ptype">كامل الدورة</div>
          <div class="pegp">${m.egpFull} ج.م</div>
          <div class="pusd">${m.usdFull}$</div>
        </div>
        <div class="price-box">
          <div class="ptype">اشتراك شهري</div>
          <div class="pegp">${m.egpMonth} ج.م/شهر</div>
          <div class="pusd">${m.usdMonth}$/شهر</div>
          ${m.extraUSD ? `<div class="pextra">+${m.extraEGP} ج.م / +${m.extraUSD}$ عن كل شهر قديم</div>` : ''}
        </div>
      </div>

      <div class="section-lbl">روابط الدفع</div>
      <div class="link-row">
        <span class="link-label">رابط الكامل</span>
        <div class="link-actions">${fullLink}</div>
      </div>
      <div class="link-row">
        <span class="link-label">رابط الشهري</span>
        <div class="link-actions">${monthLink}</div>
      </div>

      <div class="section-lbl mt-2">ملاحظاتي</div>
      <textarea class="notes-area" id="note-${m.id}" placeholder="أكتبي ملاحظاتك هنا...">${m.note}</textarea>

      <div class="status-row">
        <span class="status-lbl">الحالة:</span>
        <select class="status-sel" id="status-${m.id}">
          <option value="upcoming" ${m.status==='upcoming'?'selected':''}>قادم</option>
          <option value="active"   ${m.status==='active'  ?'selected':''}>جارٍ الآن</option>
          <option value="done"     ${m.status==='done'    ?'selected':''}>تم الإعلان</option>
          <option value="closed"   ${m.status==='closed'  ?'selected':''}>انتهى</option>
        </select>
        <button class="save-btn" id="savebtn-${m.id}" onclick="saveCard(${m.id})">حفظ</button>
        <button class="btn-copy" style="margin-right:4px" onclick="openEditModal(${m.id})">✏ تعديل</button>
      </div>
    `;

    head.addEventListener('click', () => toggleCard(m.id));
    card.appendChild(head);
    card.appendChild(body);
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const body  = document.getElementById(`body-${id}`);
  const chev  = document.getElementById(`chev-${id}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function saveCard(id) {
  MONTHS[id].note   = document.getElementById(`note-${id}`).value;
  MONTHS[id].status = document.getElementById(`status-${id}`).value;
  persist();
  const btn = document.getElementById(`savebtn-${id}`);
  btn.textContent = '✓ تم الحفظ'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'حفظ'; btn.classList.remove('saved'); render(); }, 1500);
}

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✓ تم النسخ'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => { alert('افتحي الرابط وانسخيه يدوياً: ' + url); });
}

// ─── Edit modal ───────────────────────────────────────────────────────────────
let editingId = null;

function openEditModal(id) {
  editingId = id;
  const m = MONTHS[id];
  document.getElementById('modal-subtitle').textContent = `تعديل — ${m.label}`;
  const fields = document.getElementById('modal-fields');
  fields.innerHTML = `
    <div class="field-group"><label>الاسم</label><input id="ef-label" value="${m.label}"></div>
    <div class="field-group"><label>تاريخ فتح الحجز (YYYY-MM-DD)</label><input id="ef-bookStart" value="${m.bookStart||''}"></div>
    <div class="field-group"><label>تاريخ إغلاق الحجز (YYYY-MM-DD)</label><input id="ef-bookEnd" value="${m.bookEnd||''}"></div>
    <div class="field-group"><label>السعر الكامل (ج.م)</label><input id="ef-egpFull" type="number" value="${m.egpFull}"></div>
    <div class="field-group"><label>السعر الشهري (ج.م)</label><input id="ef-egpMonth" type="number" value="${m.egpMonth}"></div>
    <div class="field-group"><label>السعر الكامل ($)</label><input id="ef-usdFull" type="number" value="${m.usdFull}"></div>
    <div class="field-group"><label>السعر الشهري ($)</label><input id="ef-usdMonth" type="number" value="${m.usdMonth}"></div>
    <div class="field-group"><label>زيادة الأشهر القديمة (ج.م)</label><input id="ef-extraEGP" type="number" value="${m.extraEGP||''}"></div>
    <div class="field-group"><label>زيادة الأشهر القديمة ($)</label><input id="ef-extraUSD" type="number" value="${m.extraUSD||''}"></div>
    <div class="field-group"><label>رابط الكامل</label><input id="ef-linkFull" value="${m.linkFull}"></div>
    <div class="field-group"><label>رابط الشهري</label><input id="ef-linkMonth" value="${m.linkMonth}"></div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

document.getElementById('modal-save-btn').addEventListener('click', () => {
  if (editingId === null) return;
  const m = MONTHS[editingId];
  m.label      = document.getElementById('ef-label').value;
  m.bookStart  = document.getElementById('ef-bookStart').value || null;
  m.bookEnd    = document.getElementById('ef-bookEnd').value   || null;
  m.egpFull    = +document.getElementById('ef-egpFull').value;
  m.egpMonth   = +document.getElementById('ef-egpMonth').value;
  m.usdFull    = +document.getElementById('ef-usdFull').value;
  m.usdMonth   = +document.getElementById('ef-usdMonth').value;
  m.extraEGP   = +document.getElementById('ef-extraEGP').value || null;
  m.extraUSD   = +document.getElementById('ef-extraUSD').value || null;
  m.linkFull   = document.getElementById('ef-linkFull').value;
  m.linkMonth  = document.getElementById('ef-linkMonth').value;
  persist();
  document.getElementById('modal-overlay').classList.remove('show');
  render();
});

document.getElementById('modal-close').addEventListener('click',   () => document.getElementById('modal-overlay').classList.remove('show'));
document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) document.getElementById('modal-overlay').classList.remove('show'); });
document.getElementById('fab-btn').addEventListener('click', () => alert('اضغطي على زر "✏ تعديل" داخل أي شهر لتعديل بياناته'));

// ─── Init ─────────────────────────────────────────────────────────────────────
loadSaved();
render();
</script>
</body>
</html>
